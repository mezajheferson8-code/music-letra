<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de musica-mp3</title>
    <!-- Iconos de Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section class="reproductor-musica">
        <div class="reproduction-music">
            <h1>Cargando título...</h1>
            <p>Artista</p>
        </div>

        <audio id="cancion">
            <source src="" type="audio/mpeg">
        </audio>

        <input type="range" value="0" id="progreso">

        <div class="controls">
            <button class="atras">
                <i class="bi bi-rewind-fill"></i>
            </button>
            
            <button class="boton-reproducir-pausar">
                <i class="bi bi-play-fill" id="iconoControl"></i>
            </button>
            
            <button class="adelante">
                <i class="bi bi-fast-forward-fill"></i>
            </button>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
