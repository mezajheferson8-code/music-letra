<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Flor - Espacio Privado 🌻</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-light: #fce4ec;
            --pink-dark: #d81b60;
            --bg-dark: #0d1117;
        }

        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--pink-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.8s ease;
        }

        #login_screen {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(216, 27, 96, 0.15);
            text-align: center;
            width: 90%;
            max-width: 320px;
            z-index: 10;
            transition: all 0.5s ease;
        }

        .input-display {
            background: #fdf2f5;
            border: 2px solid var(--pink-light);
            border-radius: 15px;
            padding: 15px;
            font-size: 1.8rem;
            letter-spacing: 10px;
            color: var(--pink-dark);
            margin: 20px 0;
            min-height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            background: white;
            border: 1.5px solid var(--pink-light);
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 50%;
            cursor: pointer;
            color: var(--pink-dark);
            aspect-ratio: 1/1;
        }

        #content_screen {
            display: none;
            opacity: 0;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            transition: opacity 1s ease;
        }

        .landscape-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            text-align: center;
            color: white;
        }

        /* Estilo para el contenedor del video */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            margin: 15px 0;
            border-radius: 15px;
            overflow: hidden;
            display: none; /* Se oculta al inicio */
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .landscape-flower {
            width: 100%;
            border-radius: 15px;
            margin: 15px 0;
        }

        .flower-btn {
            background: linear-gradient(135deg, #ff9800, #ff5722);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .sunflower-icon { font-size: 3rem; animation: sway 3s infinite ease-in-out; display: inline-block; }
        @keyframes sway {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }
    </style>
</head>
<body>

<script src="https://static.sketchfab.com/static/builds/web/dist/9ee9e3a75338b7653406c7b413f8df5e-v2.js" crossorigin="anonymous"></script>></script>

    <div id="login_screen">
        <h2 style="color: var(--pink-dark)">FLOR 🌸</h2>
        <div class="input-display" id="display">....</div>
        <div class="keypad">
            <button class="key" onclick="press('1')">1</button>
            <button class="key" onclick="press('2')">2</button>
            <button class="key" onclick="press('3')">3</button>
            <button class="key" onclick="press('4')">4</button>
            <button class="key" onclick="press('5')">5</button>
            <button class="key" onclick="press('6')">6</button>
            <button class="key" onclick="press('7')">7</button>
            <button class="key" onclick="press('8')">8</button>
            <button class="key" onclick="press('9')">9</button>
            <div style="grid-column: 2"><button class="key" onclick="press('0')">0</button></div>
        </div>
    </div>

    <div id="content_screen">
        <div class="landscape-card">
            <div class="sunflower-icon">🌻</div> 
            <h1>Para Flor</h1>
            
            <!-- Imagen inicial -->
            <img id="placeholder_img" class="landscape-flower" src="https://img.freepik.com/fotos-premium/flores-campo-fondos-pantalla-e-imagenes_136558-3.jpg?w=2000">

            <!-- Contenedor donde aparecerá el video -->
            <div id="video_wrapper" class="video-container">
                <div id="youtube-player"></div>
            </div>

            <button class="flower-btn" id="play_btn">🎬 VER VIDEO Y MÚSICA</button>
        </div>
    </div>

    <script>
        const passCorrecta = "1234";
        let intencionActual = "";
        const loginScreen = document.getElementById('login_screen');
        const contentScreen = document.getElementById('content_screen');
        const display = document.getElementById('display');
        const playBtn = document.getElementById('play_btn');
        const videoWrapper = document.getElementById('video_wrapper');
        const placeholderImg = document.getElementById('placeholder_img');

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                videoId: 'S-mN__3xCDU',
                playerVars: { 'autoplay': 0, 'rel': 0 }
            });
        }

        function press(num) {
            if (intencionActual.length < 4) {
                intencionActual += num;
                display.innerText = "•".repeat(intencionActual.length);
                if (intencionActual.length === 4) setTimeout(validar, 200);
            }
        }

        function validar() {
            if (intencionActual === passCorrecta) {
                loginScreen.style.display = "none";
                document.body.style.backgroundColor = "#0d1117"; 
                contentScreen.style.display = "flex";
                setTimeout(() => { contentScreen.style.opacity = "1"; }, 50);
            } else {
                intencionActual = "";
                display.innerText = "....";
            }
        }

        let isVideoVisible = false;
        playBtn.onclick = () => {
            if (!isVideoVisible) {
                // Mostrar el video y ocultar la imagen
                videoWrapper.style.display = "block";
                placeholderImg.style.display = "none";
                player.playVideo();
                playBtn.innerText = "⏸ PAUSAR";
                isVideoVisible = true;
            } else {
                // Alternar entre pausa y play
                const state = player.getPlayerState();
                if (state === 1) { // 1 es reproduciendo
                    player.pauseVideo();
                    playBtn.innerText = "▶️ REPRODUCIR";
                } else {
                    player.playVideo();
                    playBtn.innerText = "⏸ PAUSAR";
                }
            }
        };
    </script>
</body>
</html>
