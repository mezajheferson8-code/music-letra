<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rock That Body - Remix Sync</title>
    <style>
        body {
            background-color: #000;
            color: #00f3ff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Capa del GIF de fondo */
        #bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.pinimg.com/originals/7f/d4/93/7fd493d029e88f51324cc8e3ebb8d403.gif');
            background-size: cover;
            background-position: center;
            z-index: -1;
            opacity: 0; /* Invisible al inicio */
            transition: opacity 1s ease-in-out;
            filter: brightness(0.4); /* Oscurece un poco el GIF para que la letra se lea bien */
        }

        #lyric-box {
            height: 120px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px #000, 0 0 10px #00f3ff;
            max-width: 85%;
            margin-bottom: 40px;
            z-index: 1;
        }

        .player-wrapper {
            background: rgba(17, 17, 17, 0.8);
            padding: 15px;
            border-radius: 50px;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            z-index: 1;
        }

        audio {
            filter: invert(100%) hue-rotate(180deg);
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 1.2em;
            background-color: #ff00ff;
            margin-left: 8px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <!-- Fondo que se activará con JS -->
    <div id="bg-gif"></div>

    <div id="lyric-box">Presiona PLAY para empezar</div>

    <div class="player-wrapper">
        <audio id="music" controls>
            <source src="music/The Black Eyed Peas - Rock That Body (Zusebi Remix) [TikTok].mp3" type="audio/mpeg">
            <source src="cancion.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const audio = document.getElementById('music');
        const box = document.getElementById('lyric-box');
        const bg = document.getElementById('bg-gif');

        const lyrics = [
            { time: 0.1,  text: "I want to... I want to dance in the lights" },
            { time: 3.5,  text: "I want to... I want to rock your body" },
            { time: 7.0,  text: "I want to go... I want to go for a ride" },
            { time: 10.5, text: "Music and rock your body" },
            { time: 14.0, text: "I want to rock your body" },
            { time: 17.5, text: "I want to go... I want to go for..." },
            { time: 21.0, text: "Let the music and rock your body" },
            { time: 24.0, text: "Rock. Come on. Come on. Rock." },
            { time: 27.5, text: "Rock your body. Rock." },
            { time: 34.0, text: "Come on. Come on. Rock." },
            { time: 36.0, text: "Rock that body. Come on. Come on." },
            { time: 39.0, text: "Rock your body. Let me see your body." },
            { time: 44.0, text: "Shaking it from the bottom to top." },
            { time: 46.0, text: "Watch the DJ drop. We be the ones to make it hot!" },
            { time: 51.0, text: "Electric shock. Energy like a billion watts. BOOM!" }
        ];

        let currentIndex = -1;

        async function typeWriter(text) {
            box.innerHTML = ""; 
            for (let char of text) {
                box.innerHTML += char;
                await new Promise(r => setTimeout(r, 35)); 
            }
            box.innerHTML += '<span class="cursor"></span>';
        }

        // ACTIVAR FONDO Y SINCRONIZACIÓN
        audio.onplay = () => {
            bg.style.opacity = "1"; // Aparece el GIF suavemente
        };

        audio.onpause = () => {
            bg.style.opacity = "0.3"; // Se oscurece un poco si pausas
        };

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            let line = lyrics.find((l, i) => {
                const next = lyrics[i + 1];
                return currentTime >= l.time && (!next || currentTime < next.time);
            });

            if (line && lyrics.indexOf(line) !== currentIndex) {
                currentIndex = lyrics.indexOf(line);
                typeWriter(line.text);
            }
        });
    </script>
</body>
</html>
