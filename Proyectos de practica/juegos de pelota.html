<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>PONG</h1>
        <div class="scoreboard">
            <div class="score-player">
                <span class="label">Player</span>
                <span class="score" id="playerScore">0</span>
            </div>
            <div class="score-computer">
                <span class="label">Computer</span>
                <span class="score" id="computerScore">0</span>
            </div>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="controls">
            <p>Controls: Mouse or Arrow Keys (↑↓) to move paddle</p>
            <p>Press SPACE to start/pause game</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
