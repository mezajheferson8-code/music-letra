<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock That Body - Remix Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #00f3ff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Capa del GIF de fondo */
        #bg-gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.pinimg.com/originals/7f/d4/93/7fd493d029e88f51324cc8e3ebb8d403.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            filter: brightness(0.4);
        }

        #lyric-box {
            min-height: 100px;
            max-height: 150px;
            text-align: center;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: bold;
            text-shadow: 0 0 20px #000, 0 0 10px #00f3ff;
            max-width: 90%;
            margin-bottom: 30px;
            margin-top: 20px;
            z-index: 1;
            word-wrap: break-word;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-wrapper {
            background: rgba(17, 17, 17, 0.9);
            padding: 15px 20px;
            border-radius: 50px;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            z-index: 1;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: center;
        }

        audio {
            width: 100%;
            max-width: 450px;
            filter: invert(100%) hue-rotate(180deg);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: #ff00ff;
            margin-left: 5px;
            animation: blink 0.7s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Media Queries para diferentes tamaños de pantalla */
        @media (max-width: 768px) {
            body {
                padding: 15px;
                min-height: 100vh;
            }

            #lyric-box {
                font-size: clamp(1.2rem, 4vw, 1.8rem);
                margin-bottom: 25px;
                margin-top: 15px;
                min-height: 80px;
                max-width: 95%;
            }

            .player-wrapper {
                padding: 12px 15px;
                max-width: 100%;
            }

            audio {
                max-width: 100%;
            }

            .cursor {
                width: 6px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            #lyric-box {
                font-size: clamp(1rem, 3.5vw, 1.5rem);
                margin-bottom: 20px;
                margin-top: 10px;
                min-height: 70px;
                max-width: 98%;
            }

            .player-wrapper {
                padding: 10px 12px;
                border-radius: 40px;
            }

            audio {
                max-width: 100%;
            }

            .cursor {
                width: 5px;
            }
        }

        /* Tablets en orientación horizontal */
        @media (max-width: 1024px) and (orientation: landscape) {
            body {
                min-height: auto;
                padding: 10px;
            }

            #lyric-box {
                margin-bottom: 15px;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- Fondo que se activará con JS -->
    <div id="bg-gif"></div>

    <div id="lyric-box">Presiona PLAY para empezar</div>

    <div class="player-wrapper">
        <audio id="music" controls>
            <source src="music/The Black Eyed Peas - Rock That Body (Zusebi Remix) [TikTok].mp3" type="audio/mpeg">
            <source src="cancion.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const audio = document.getElementById('music');
        const box = document.getElementById('lyric-box');
        const bg = document.getElementById('bg-gif');

        const lyrics = [
            { time: 0.1,  text: "I want to... I want to dance in the lights" },
            { time: 3.5,  text: "I want to... I want to rock your body" },
            { time: 7.0,  text: "I want to go... I want to go for a ride" },
            { time: 10.5, text: "Music and rock your body" },
            { time: 14.0, text: "I want to rock your body" },
            { time: 17.5, text: "I want to go... I want to go for..." },
            { time: 21.0, text: "Let the music and rock your body" },
            { time: 24.0, text: "Rock. Come on. Come on. Rock." },
            { time: 27.5, text: "Rock your body. Rock." },
            { time: 34.0, text: "Come on. Come on. Rock." },
            { time: 36.0, text: "Rock that body. Come on. Come on." },
            { time: 39.0, text: "Rock your body. Let me see your body." },
            { time: 44.0, text: "Shaking it from the bottom to top." },
            { time: 46.0, text: "Watch the DJ drop. We be the ones to make it hot!" },
            { time: 51.0, text: "Electric shock. Energy like a billion watts. BOOM!" }
        ];

        let currentIndex = -1;

        async function typeWriter(text) {
            box.innerHTML = ""; 
            for (let char of text) {
                box.innerHTML += char;
                await new Promise(r => setTimeout(r, 35)); 
            }
            box.innerHTML += '<span class="cursor"></span>';
        }

        // ACTIVAR FONDO Y SINCRONIZACIÓN
        audio.onplay = () => {
            bg.style.opacity = "1";
        };

        audio.onpause = () => {
            bg.style.opacity = "0.3";
        };

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            let line = lyrics.find((l, i) => {
                const next = lyrics[i + 1];
                return currentTime >= l.time && (!next || currentTime < next.time);
            });

            if (line && lyrics.indexOf(line) !== currentIndex) {
                currentIndex = lyrics.indexOf(line);
                typeWriter(line.text);
            }
        });
    </script>
</body>
</html>
