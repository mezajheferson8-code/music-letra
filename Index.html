<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock That Body - Remix</title>
    <style>
        body {
            background-color: #000;
            color: #00f3ff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #bg-gif {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.pinimg.com/originals/7f/d4/93/7fd493d029e88f51324cc8e3ebb8d403.gif');
            background-size: cover;
            background-position: center;
            z-index: -1;
            opacity: 0;
            transition: opacity 1s;
            filter: brightness(0.4);
        }
        #lyric-box {
            height: 140px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 15px #00f3ff;
            max-width: 90%;
            z-index: 1;
        }
        .player-wrapper {
            background: rgba(20, 20, 20, 0.8);
            padding: 15px;
            border-radius: 50px;
            border: 2px solid #00f3ff;
            z-index: 1;
            width: 85%;
        }
        audio { width: 100%; filter: invert(100%); }
    </style>
</head>
<body>
    <div id="bg-gif"></div>
    <div id="lyric-box">¡Toca PLAY para empezar! 🎵</div>
    <div class="player-wrapper">
        <audio id="music" controls>
            <source src="cancion.mp3" type="audio/mpeg">
        </audio>
    </div>
    <script>
        const audio = document.getElementById('music');
        const box = document.getElementById('lyric-box');
        const bg = document.getElementById('bg-gif');

        const lyrics = [
            { time: 0.1,  text: "I want to... dance in the lights" },
            { time: 3.5,  text: "I want to... rock your body" },
            { time: 7.0,  text: "I want to go... for a ride" },
            { time: 10.5, text: "Music and rock your body" },
            { time: 14.0, text: "I want to rock your body" },
            { time: 24.0, text: "Rock. Come on. Come on. Rock." },
            { time: 36.0, text: "Rock that body. Come on. Come on." },
            { time: 46.0, text: "Watch the DJ drop. We make it hot!" },
            { time: 51.0, text: "Electric shock. Billion watts. BOOM!" }
        ];

        let currentIndex = -1;
        async function type(t) {
            box.innerHTML = "";
            for (let c of t) { box.innerHTML += c; await new Promise(r => setTimeout(r, 40)); }
        }
        audio.onplay = () => { bg.style.opacity = "1"; };
        audio.ontimeupdate = () => {
            let line = lyrics.find((l, i) => audio.currentTime >= l.time && (!lyrics[i+1] || audio.currentTime < lyrics[i+1].time));
            if (line && lyrics.indexOf(line) !== currentIndex) {
                currentIndex = lyrics.indexOf(line);
                type(line.text);
            }
        };
    </script>
</body>
</html>
